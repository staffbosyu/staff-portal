<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>スタッフ専用 追加募集ポータル</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    :root { --primary: #4A90E2; --bg: #F5F7FA; --text: #333; --card-bg: #FFF; --danger: #E74C3C; --secondary: #2ECC71; }
    body { font-family: sans-serif; background: var(--bg); color: var(--text); margin: 0; padding-bottom: 80px; }
    
    #mainSection { padding: 15px; }
    .tab-container { display: flex; background: #ddd; border-radius: 10px; margin-bottom: 20px; overflow: hidden; }
    .tab-btn { flex: 1; padding: 12px; border: none; background: none; font-weight: bold; cursor: pointer; }
    .tab-btn.active { background: var(--primary); color: white; }
    .card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 20px; }
    input { width: 100%; padding: 12px; margin: 8px 0 20px; border: 1px solid #ccc; border-radius: 8px; box-sizing: border-box; font-size: 16px; }
    
    .calendar-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 5px; text-align: center; }
    .calendar-day { padding: 10px 0; border-radius: 5px; background: #f9f9f9; cursor: pointer; }
    .calendar-day.has-job { background: var(--primary); color: white; font-weight: bold; }
    .calendar-day.selected { border: 2px solid #333; }
    
    .job-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); margin-bottom: 15px; border-left: 5px solid var(--primary); }
    .job-title { font-size: 18px; font-weight: bold; margin-bottom: 8px; }
    .job-detail { font-size: 13px; margin-bottom: 4px; color: #555; }
    .btn { display: block; width: 100%; padding: 12px; color: white; text-align: center; border: none; border-radius: 8px; font-size: 16px; font-weight: bold; cursor: pointer; }
    .btn-select { background: var(--primary); }
    .btn-remove { background: #95A5A6; }
    
    #cartBar { position: fixed; bottom: 0; left: 0; right: 0; background: var(--secondary); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; transform: translateY(100%); transition: transform 0.3s; z-index: 100; }
    #cartBar.active { transform: translateY(0); }
    #cartBar button { background: white; color: var(--secondary); border: none; padding: 8px 15px; border-radius: 5px; font-weight: bold; cursor: pointer; }
    
    #modalOverlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; z-index: 999; }
    #customModal { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: white; padding: 20px; border-radius: 10px; width: 85%; max-width: 400px; display: none; z-index: 1000; }
    #loading { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(255,255,255,0.8); display: none; align-items: center; justify-content: center; z-index: 2000; font-weight: bold; color: var(--primary); }
  </style>
</head>
<body>
  <div id="loading">処理中...</div>
  
  <div id="mainSection">
    <h2 style="color: var(--primary); margin-top: 0;">追加募集 ポータル</h2>
    
    <div class="card">
      <h3 style="margin-top: 0; margin-bottom: 15px; font-size: 16px; border-bottom: 1px solid #eee; padding-bottom: 10px;">応募者情報</h3>
      <label style="font-size: 14px; font-weight: bold;">スタッフID</label>
      <input type="text" id="inputStaffId" value="" placeholder="例: 12345" autocapitalize="off">
      <label style="font-size: 14px; font-weight: bold;">お名前</label>
      <input type="text" id="inputStaffName" placeholder="例: 山田 太郎">
    </div>
    
    <div class="tab-container">
      <button class="tab-btn active" id="tabSearch" onclick="showTab('search')">案件を探す</button>
      <button class="tab-btn" id="tabHistory" onclick="showTab('history')">応募履歴</button>
    </div>
    
    <div id="searchView">
      <div class="card" style="border-left: 5px solid #F1C40F; background: #FEF9E7; padding: 15px;">
        <h3 style="margin-top: 0; margin-bottom: 10px; font-size: 15px; color: #D35400;">⚠️ 応募に関する注意事項</h3>
        <ul style="margin: 0; padding-left: 20px; font-size: 13px; color: #555; line-height: 1.6;">
          <li>応募は<b>1日1案件まで</b>となります。</li>
          <li>同日に複数応募された場合はエラーとなりますのでご注意ください。</li>
          <li>ご自身のスケジュールをよく確認の上、ご応募をお願いいたします。</li>
        </ul>
      </div>

      <div class="card">
        <div style="display: flex; justify-content: space-between; margin-bottom: 10px; font-weight: bold;">
          <button style="border:none; background:none; font-size:18px; cursor:pointer;" onclick="changeMonth(-1)">◀</button>
          <span id="currentMonthLabel"></span>
          <button style="border:none; background:none; font-size:18px; cursor:pointer;" onclick="changeMonth(1)">▶</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
      </div>
      <div id="jobsContainer"></div>
    </div>
    
    <div id="historyView" style="display: none;">
      <div id="historyContainer"></div>
    </div>
  </div>
  
  <div id="cartBar"><span id="cartCountText">0件 選択中</span><button onclick="showConfirmModal()">まとめて応募</button></div>
  <div id="modalOverlay"></div>
  <div id="customModal">
    <div id="modalTitle" style="font-weight: bold; font-size: 18px; margin-bottom: 10px;"></div>
    <div id="modalBody" style="font-size: 14px; margin-bottom: 20px; max-height: 250px; overflow-y: auto;"></div>
    <div style="display: flex; gap: 10px;">
      <button class="btn" id="modalCancelBtn" style="background: #ddd; color: #333; flex: 1;" onclick="closeModal()">キャンセル</button>
      <button class="btn" style="background: var(--primary); flex: 1;" id="modalOkBtn">OK</button>
    </div>
  </div>
  
  <script>
    // ★ここに取得したGASのWebアプリケーションURLを貼り付けてください★
    const GAS_URL = 'https://script.google.com/macros/s/AKfycbxmSLHFhoVkhmZ1Weag3tjV6b-T-0DavUllxyYazlLcQMARc7P7_PnflLWiykHBO3JO/exec';

    let allJobs = [], selectedJobs = [], currentDate = new Date(), selectedDateStr = "";
    let paramGroup = 'SO', paramType = 'A';

    // 共通の通信関数 (fetchを使用)
    function callGasApi(params) {
      const url = new URL(GAS_URL);
      Object.keys(params).forEach(key => url.searchParams.append(key, params[key]));
      return fetch(url).then(res => {
        if (!res.ok) throw new Error('通信エラーが発生しました。');
        return res.json();
      });
    }
    
    window.onload = function() {
      // 外部HTML用のURLパラメータ取得処理
      const urlParams = new URLSearchParams(window.location.search);
      paramGroup = urlParams.get('group') || 'SO';
      paramType = urlParams.get('type') || 'A';
      const staffId = urlParams.get('staffId') || '';
      
      if (staffId) {
        document.getElementById('inputStaffId').value = staffId;
      }
      
      loadJobs();
    };
    
    function loadJobs() {
      toggleLoading(true);
      callGasApi({ action: 'getJobs', group: paramGroup, type: paramType })
        .then(function(jobs) {
          toggleLoading(false); 
          allJobs = jobs; 
          renderCalendar();
        })
        .catch(function(err) {
          toggleLoading(false);
          showModal('エラー', '案件の読み込みに失敗しました。<br>' + err.message, null, false);
        });
    }
    
    function showTab(type) {
      document.getElementById('tabSearch').classList.toggle('active', type === 'search');
      document.getElementById('tabHistory').classList.toggle('active', type === 'history');
      document.getElementById('searchView').style.display = (type === 'search' ? 'block' : 'none');
      document.getElementById('historyView').style.display = (type === 'history' ? 'block' : 'none');
      if (type === 'history') loadHistory();
    }
    
    function loadHistory() {
      const staffId = document.getElementById('inputStaffId').value.trim();
      if (!staffId) {
        document.getElementById('historyContainer').innerHTML = '<div style="color:var(--danger); font-weight:bold; padding:10px;">※履歴を確認するには、上部の「スタッフID」を入力してください。</div>';
        return;
      }
      
      document.getElementById('historyContainer').innerHTML = '読み込み中...';
      callGasApi({ action: 'getMyHistory', staffId: staffId })
        .then(function(history) {
          if (!history.length) { document.getElementById('historyContainer').innerHTML = '履歴なし'; return; }
          let html = '';
          history.reverse().forEach(h => {
            html += `<div class="job-card" style="border-left-color:var(--secondary)"><b>${h.jobName}</b><br><small>${h.date}</small></div>`;
          });
          document.getElementById('historyContainer').innerHTML = html;
        })
        .catch(function(err) {
          document.getElementById('historyContainer').innerHTML = '<div style="color:red">履歴の読み込みに失敗しました</div>';
        });
    }
    
    function renderCalendar() {
      const year = currentDate.getFullYear(), month = currentDate.getMonth();
      document.getElementById('currentMonthLabel').innerText = `${year}年 ${month + 1}月`;
      const grid = document.getElementById('calendarGrid'); grid.innerHTML = '';
      
      ['日','月','火','水','木','金','土'].forEach(d => grid.innerHTML += `<small style="color:#888">${d}</small>`);
      const first = new Date(year, month, 1).getDay(), last = new Date(year, month + 1, 0).getDate();
      for (let i = 0; i < first; i++) grid.innerHTML += '<div></div>';
      
      for (let i = 1; i <= last; i++) {
        const dStr = `${year}/${('0'+(month+1)).slice(-2)}/${('0'+i).slice(-2)}`;
        const has = allJobs.some(j => j.date === dStr);
        grid.innerHTML += `<div class="calendar-day ${has?'has-job':''} ${dStr===selectedDateStr?'selected':''}" onclick="selectDate('${dStr}')">${i}</div>`;
      }
    }
    
    function changeMonth(n) { currentDate.setMonth(currentDate.getMonth() + n); renderCalendar(); }
    function selectDate(d) { selectedDateStr = d; renderCalendar(); renderJobs(d); }
    
    function renderJobs(dateStr) {
      const container = document.getElementById('jobsContainer'); container.innerHTML = '';
      const dayJobs = allJobs.filter(j => j.date === dateStr);
      
      dayJobs.forEach(job => {
        const isSel = selectedJobs.some(s => s.id === job.id), isFull = job.currentCount >= job.capacity;
        const btn = isSel ? `<button class="btn btn-remove" onclick="toggleJob('${job.id}','','',true)">選択解除</button>` : (isFull ? '<b style="color:red">満員</b>' : `<button class="btn btn-select" onclick="toggleJob('${job.id}','${job.date}','${job.eventName}',false)">選択</button>`);
        
        const notesHtml = job.notes ? `<div class="job-detail" style="margin-top:5px; color:#666; background:#f5f5f5; padding:5px; border-radius:4px;">📝備考: ${job.notes.replace(/\n/g, '<br>')}</div>` : '';
        
        container.innerHTML += `
          <div class="job-card">
            <b>${job.eventName}</b>
            <div class="job-detail" style="margin-top:5px;">📅日付: ${job.date}</div>
            <div class="job-detail">📍場所: ${job.venue}</div>
            <div class="job-detail">🕒時間: ${job.startTime}～${job.endTime}</div>
            <div class="job-detail">📋内容: ${job.task||''}</div>
            <div class="job-detail">👥人数: ${job.currentCount} / ${job.capacity} 名</div>
            ${notesHtml}
            <div style="margin-top:10px">${btn}</div>
          </div>`;
      });
    }
    
    function toggleJob(id, date, name, isRem) {
      if (isRem) { selectedJobs = selectedJobs.filter(j => j.id !== id); }
      else {
        if (selectedJobs.some(j => j.date === date)) { showModal('エラー', '同日1件までです', null, false); return; }
        selectedJobs.push({ id, date, name });
      }
      
      const bar = document.getElementById('cartBar');
      if (selectedJobs.length) { document.getElementById('cartCountText').innerText = `${selectedJobs.length}件選択中`; bar.classList.add('active'); }
      else { bar.classList.remove('active'); }
      renderJobs(selectedDateStr);
    }
    
    function showConfirmModal() {
      const staffId = document.getElementById('inputStaffId').value.trim();
      const staffName = document.getElementById('inputStaffName').value.trim();
      
      if (!staffId || !staffName) {
        showModal('エラー', '上部の「スタッフID」と「お名前」を入力してから応募してください。', null, false);
        return;
      }
      
      let h = '<ul>'; selectedJobs.forEach(j => h += `<li style="margin-bottom:8px;">${j.date}: ${j.name} <button style="margin-left:10px; cursor:pointer;" onclick="removeJobFromModal('${j.id}')">取消</button></li>`);
      
      showModal('応募確認', h + '</ul><p style="margin-top:15px; color:var(--primary); font-weight:bold;">この内容で応募しますか？</p>', function() {
        toggleLoading(true);
        
        callGasApi({
          action: 'applyForJobs',
          staffId: staffId,
          staffName: staffName,
          jobsArray: JSON.stringify(selectedJobs) // 配列を文字列化して送信
        })
        .then(function(res) {
          toggleLoading(false); 
          showModal('結果', res.message.replace(/\n/g,'<br>'), () => { 
            if(res.success) {
              selectedJobs=[]; loadJobs(); document.getElementById('cartBar').classList.remove('active');
            } 
          }, false);
        })
        .catch(function(err) {
          toggleLoading(false);
          showModal('エラー', '通信に失敗しました。<br>' + err.message, null, false);
        });
      });
    }
    
    window.removeJobFromModal = function(id) {
      selectedJobs = selectedJobs.filter(j => j.id !== id);
      if (!selectedJobs.length) { closeModal(); document.getElementById('cartBar').classList.remove('active'); } else { showConfirmModal(); }
      renderJobs(selectedDateStr);
    };
    
    function showModal(t, b, ok, cancel = true) {
      document.getElementById('modalTitle').innerText = t; document.getElementById('modalBody').innerHTML = b;
      document.getElementById('modalCancelBtn').style.display = cancel ? 'block' : 'none';
      document.getElementById('modalOkBtn').onclick = () => { closeModal(); if(ok) ok(); };
      document.getElementById('modalOverlay').style.display = 'block'; document.getElementById('customModal').style.display = 'block';
    }
    
    function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; document.getElementById('customModal').style.display = 'none'; }
    function toggleLoading(s) { document.getElementById('loading').style.display = s ? 'flex' : 'none'; }
  </script>
</body>
</html>
